name: TestFlight

# Build and upload Welkin to TestFlight whenever code lands on main.
# Skips doc-only changes. Can also be run by hand from the Actions tab.
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

# Never run two uploads at once (avoids build-number races).
concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  testflight:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Set up Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build & upload to TestFlight
        run: bundle exec fastlane beta
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          ASC_DIST_CERT: ${{ secrets.ASC_DIST_CERT }}
          ASC_DIST_CERT_PASSWORD: ${{ secrets.ASC_DIST_CERT_PASSWORD }}
