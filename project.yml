name: Welkin
options:
  bundleIdPrefix: com.github.jaramah
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "V5LHDBRQYB"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  Welkin:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Sources
      - Resources
    dependencies:
      - target: WelkinWidgetExtension
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Welkin
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: "Welkin uses your location to show local weather and air quality."
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        # Must reference the build settings, or the CI's build-number override
        # has nothing to substitute into and every upload reuses the same version.
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        # Welkin uses only standard HTTPS (exempt encryption). Declaring this
        # auto-clears the App Store Connect "Missing Compliance" gate so every
        # build is installable in TestFlight with no manual step.
        ITSAppUsesNonExemptEncryption: false
        # Lets iOS wake the app to re-check the weather and fire alerts.
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.github.jaramah.Welkin.refresh
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.github.jaramah.Welkin
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: Resources/Welkin.entitlements

  WelkinWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Widget
      - path: Sources/Shared
      - path: Sources/Models/WeatherCode.swift
      - path: Sources/Models/AirQuality.swift
      - path: Sources/Models/WeatherModels.swift
      - path: Sources/Models/Landmark.swift
      - path: Sources/Models/CityFacts.swift
      - path: Sources/Models/RegionalNowcast.swift
      - path: Sources/Services/NEAService.swift
      - path: Sources/Services/WeatherService.swift
      - path: Sources/Services/OpenMeteoDTO.swift
      - path: Sources/Views/Components/LandmarkShape.swift
      - path: Sources/DesignSystem/Theme.swift
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Welkin
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.github.jaramah.Welkin.WelkinWidget
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Widget/WelkinWidget.entitlements
        TARGETED_DEVICE_FAMILY: "1"
