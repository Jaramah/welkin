name: Aurora
options:
  bundleIdPrefix: com.aurora.weather
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  Aurora:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Sources
      - Resources
    dependencies:
      - target: AuroraWidgetExtension
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Aurora
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: "Aurora uses your location to show local weather and air quality."
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aurora.weather.Aurora
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: Resources/Aurora.entitlements

  AuroraWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Widget
      - path: Sources/Shared
      - path: Sources/Models/WeatherCode.swift
      - path: Sources/Models/AirQuality.swift
      - path: Sources/Models/WeatherModels.swift
      - path: Sources/Models/Landmark.swift
      - path: Sources/Services/WeatherService.swift
      - path: Sources/Services/OpenMeteoDTO.swift
      - path: Sources/Views/Components/LandmarkShape.swift
      - path: Sources/DesignSystem/Theme.swift
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Aurora
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aurora.weather.Aurora.AuroraWidget
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Widget/AuroraWidget.entitlements
        TARGETED_DEVICE_FAMILY: "1"
